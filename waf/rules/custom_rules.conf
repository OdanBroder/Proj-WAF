############################################################
# INIT
############################################################
SecRuleEngine On

# Init IP collection
SecAction "id:1000,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR}"

############################################################
# 1. BOT DETECTION
############################################################

# Detect common scanners (safe, no false positive)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i:(curl|wget|nikto|sqlmap|masscan|nmap|dirbuster|gobuster|ffuf))" \
"id:1001,phase:1,deny,log,status:403,msg:'Scanner/Bot detected (UA)'"

# Empty User-Agent (log only)
SecRule REQUEST_HEADERS:User-Agent "@eq ''" \
"id:1002,phase:1,log,pass,msg:'Empty User-Agent (suspicious)'"

# Missing headers (bot behavior)
SecRule &REQUEST_HEADERS:Accept "@eq 0" \
"id:1003,phase:1,log,pass,msg:'Missing Accept header (possible bot)'"

SecRule &REQUEST_HEADERS:Accept-Language "@eq 0" \
"id:1004,phase:1,log,pass,msg:'Missing Accept-Language (possible bot)'"


############################################################
# 2. RATE LIMIT / SLOW DDOS
############################################################

# Count requests per IP (10 seconds window)
SecRule REQUEST_URI "@beginsWith /" \
"id:2001,phase:1,pass,nolog,setvar:ip.req_counter=+1,expirevar:ip.req_counter=10"

# Block if too many requests
SecRule IP:REQ_COUNTER "@gt 40" \
"id:2002,phase:1,deny,log,status:429,msg:'Rate limit exceeded (possible DDoS)'"


############################################################
# 3. SLOWLORIS DETECTION
############################################################

SecRule REQUEST_HEADERS:Connection "@contains keep-alive" \
"id:2003,phase:1,pass,nolog,setvar:ip.slowloris=+1,expirevar:ip.slowloris=20"

SecRule IP:SLOWLORIS "@gt 15" \
"id:2004,phase:1,deny,log,status:403,msg:'Possible Slowloris attack detected'"


############################################################
# 4. XSS DETECTION
############################################################

SecRule ARGS "@rx (?i)<script[^>]*>" \
"id:3001,phase:2,log,msg:'XSS script tag detected',setvar:tx.xss_score=+5"

SecRule ARGS "@rx (?i:onerror=|onload=)" \
"id:3002,phase:2,log,msg:'XSS event handler detected',setvar:tx.xss_score=+5"


############################################################
# 5. SQL INJECTION DETECTION
############################################################

SecRule ARGS "@rx (?i:\bOR\b\s+\d+=\d+)" \
"id:4001,phase:2,log,msg:'SQLi OR condition detected',setvar:tx.sqli_score=+5"

SecRule ARGS "@rx (?i:union\s+select)" \
"id:4002,phase:2,log,msg:'SQLi UNION detected',setvar:tx.sqli_score=+5"


############################################################
# 6. ANOMALY SCORING (BLOCK HERE)
############################################################

SecRule TX:XSS_SCORE "@gt 10" \
"id:9001,phase:2,deny,log,status:403,msg:'XSS attack blocked (score)'"

SecRule TX:SQLI_SCORE "@gt 10" \
"id:9002,phase:2,deny,log,status:403,msg:'SQLi attack blocked (score)'"


############################################################
# 7. OPTIONAL: LOGIN BRUTE FORCE PROTECTION
############################################################

SecRule REQUEST_URI "@contains login" \
"id:5001,phase:1,pass,nolog,setvar:ip.login_attempt=+1,expirevar:ip.login_attempt=60"

SecRule IP:LOGIN_ATTEMPT "@gt 15" \
"id:5002,phase:1,deny,log,status:403,msg:'Brute force login detected'"