# Custom ModSecurity Rules - Supplementary to OWASP CRS
# The main detection is handled by OWASP CRS rules:
# - REQUEST-941-APPLICATION-ATTACK-XSS.conf
# - REQUEST-942-APPLICATION-ATTACK-SQLI.conf
# - REQUEST-930-APPLICATION-ATTACK-LFI.conf
# - REQUEST-932-APPLICATION-ATTACK-RCE.conf

# Simple supplementary rules for common patterns
SecRule ARGS "@contains <script" \
    "id:11001,\
    phase:2,\
    log,\
    msg:'XSS - Script Tag Detected',\
    setvar:tx.xss_score=+8"

SecRule QUERY_STRING "@contains <script" \
    "id:11002,\
    phase:2,\
    log,\
    msg:'XSS - Script Tag in Query Detected',\
    setvar:tx.xss_score=+8"

SecRule ARGS "@pm ' OR '" \
    "id:11003,\
    phase:2,\
    log,\
    msg:'SQLi - OR Pattern Detected',\
    setvar:tx.sqli_score=+8"

SecRule QUERY_STRING "@pm ' OR '" \
    "id:11004,\
    phase:2,\
    log,\
    msg:'SQLi - OR Pattern in Query Detected',\
    setvar:tx.sqli_score=+8"
